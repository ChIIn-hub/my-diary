<!DOCTYPE html>
<html lang="zh-TW">
<link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#3e2c27">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.webmanifest">
    <title>撚撚生存日記 📔</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-brown: #3e2c27;
            --accent-orange: #bc6c25;
            --bg-sand: #f5efe9;
            --card-white: #ffffff;
            --income-green: #2d6a4f;
            --expense-red: #d90429;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg-sand); color: #2e2a28; padding-bottom: 80px; }
        .app-container { max-width: 520px; margin: 0 auto; min-height: 100vh; }

        /* 頂部模塊 */
        .header-module {
            background: var(--primary-brown);
            color: #fae6cf;
            padding: 20px 15px;
            border-radius: 0 0 25px 25px;
            position: sticky; top: 0; z-index: 100;
        }
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .month-nav button { background: none; border: none; color: #f9d8b4; font-size: 20px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 8px; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 10px 5px; border-radius: 15px; text-align: center; }
        .stat-box.highlight { background: #e6b17e; color: #3e2c27; }
        .stat-label { font-size: 11px; opacity: 0.8; margin-bottom: 4px; }
        .stat-val { font-size: 15px; font-weight: 700; }

        /* 表單與卡片 */
        .panel { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active-panel { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .section-card { background: var(--card-white); border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .title-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 15px; }
        .page-title { font-size: 18px; font-weight: 800; color: var(--primary-brown); }

        /* 輸入佈局：兩行並列 */
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; margin-bottom: 4px; color: #8b6f5c; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
        button.add-btn { width: 100%; padding: 12px; background: var(--accent-orange); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* 紀錄列表樣式 */
        .record-item { background: white; border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .rec-left { flex: 1; }
        .rec-row-1 { display: flex; align-items: baseline; gap: 8px; }
        .rec-row-2 { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .rec-id { color: #aaa; font-size: 12px; }
        .rec-date { font-size: 13px; color: #666; }
        .rec-cat { font-size: 17px; font-weight: 700; }
        .rec-note { font-size: 11px; color: #999; }
        .rec-amount { font-size: 18px; font-weight: 800; text-align: right; }
        .amt-in { color: var(--income-green); }
        .amt-out { color: var(--accent-orange); }

        /* 存款與理財 */
        .progress-container { background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--income-green); height: 100%; width: 0%; transition: 0.5s; }
        .badge { background: #fdf2e9; padding: 8px; border-radius: 10px; font-size: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent-orange); }

        /* 導航欄 */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 5px 25px; border-top: 1px solid #ddd; max-width: 520px; margin: 0 auto; }
        .nav-item { text-align: center; font-size: 11px; color: #888; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent-orange); font-weight: bold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 頂部模塊 -->
    <div class="header-module">
        <div class="month-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <h2 id="currentMonthLabel">2026年5月</h2>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">💰 該月收入</div>
                <div class="stat-val" id="topIncome">$0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">💸 該月支出</div>
                <div class="stat-val" id="topExpense">$0</div>
            </div>
            <div class="stat-box highlight">
                <div class="stat-label">⚖️ 生存餘額</div>
                <div class="stat-val" id="topSurvival">$0</div>
            </div>
        </div>
    </div>

    <!-- 收入頁面 -->
    <div id="incomePanel" class="panel active-panel">
        <div class="title-row">
            <span class="page-title">🥗 維生指數</span>
            <span style="font-weight: 800; color: var(--income-green);">總收入: <span id="pageIncTotal">$0</span></span>
        </div>
        <div class="section-card">
            <div class="form-row">
                <div class="input-group"><label>📅 日期</label><input type="date" id="incDate"></div>
                <div class="input-group">
                    <label>🏷️ 類別</label>
                    <select id="incCat">
                        <option>💰薪水</option><option>💵獎金</option><option>🏷️其他</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group"><label>💰 金額</label><input type="number" id="incAmt" placeholder="0"></div>
                <div class="input-group"><label>📝 備註</label><input type="text" id="incNote" placeholder="點擊備註"></div>
            </div>
            <button class="add-btn" onclick="addRecord('income')">📌 新增收入記錄</button>
        </div>
        <div id="incomeList"></div>
    </div>

    <!-- 支出頁面 -->
    <div id="expensePanel" class="panel">
        <div class="title-row">
            <span class="page-title">💸 總支出</span>
            <span style="font-weight: 800; color: var(--expense-red);" id="pageExpTotal">$0</span>
        </div>
        <div class="section-card">
            <div class="form-row">
                <div class="input-group"><label>📅 日期</label><input type="date" id="expDate"></div>
                <div class="input-group">
                    <label>🏷️ 類別</label>
                    <select id="expCat">
                        <option>🍽️餐飲</option><option>🏠家用</option><option>👩🏻‍🎓學貸</option><option>🚗車貸</option>
                        <option>🛜網費</option><option>☎️電話費</option><option>💡電費</option><option>💦水費</option>
                        <option>👵🏻退休基金</option><option>🏷️其他</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group"><label>💰 金額</label><input type="number" id="expAmt" placeholder="0"></div>
                <div class="input-group"><label>📝 備註</label><input type="text" id="expNote" placeholder="支出細節"></div>
            </div>
            <button class="add-btn" onclick="addRecord('expense')">📌 新增支出記錄</button>
        </div>
        <div id="expenseList"></div>
    </div>

    <!-- 理財頁面 -->
    <div id="wealthPanel" class="panel">
        <div class="page-title" style="margin-bottom:15px">📈 Alipay 存款寶</div>
        <div class="section-card" style="background: linear-gradient(135deg, #3e2c27, #5d4037); color: white;">
            <div class="stat-label">當前資產(本金+累積收益)</div>
            <div style="font-size: 28px; font-weight: 800;" id="wealthTotal">$0</div>
            <div style="display:flex; justify-content: space-between; margin-top:10px; font-size:13px; opacity:0.8;">
                <span>累積收益: <span id="accInterest">$0</span></span>
                <span>年化: 2%</span>
            </div>
        </div>
        <div class="section-card">
            <div class="form-row">
                <div class="input-group"><label>存入金額</label><input type="number" id="wealthAmt"></div>
                <div class="input-group"><label>存入日期</label><input type="date" id="wealthDate"></div>
            </div>
            <button class="add-btn" onclick="addWealth()">📥 存入存款寶</button>
        </div>
        <div id="wealthList"></div>
    </div>

    <!-- 存款頁面 -->
    <div id="savingPanel" class="panel">
        <div class="page-title" style="margin-bottom:15px">🏦 撚撚小金庫</div>
        <div class="badge">💡 理財小提醒：先存錢，再花錢！</div>
        <div class="badge">📢 生存箴言：<span id="quote">積少成多，穩健前行。</span></div>
        
        <div class="section-card">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <span style="font-size:12px">🎯 存款目標</span>
                <input type="number" id="savingTargetInput" style="width:80px; padding:2px" onchange="updateTarget()">
            </div>
            <div style="font-size:32px; font-weight:800; color:var(--primary-brown)" id="targetDisplay">$0</div>
            <div class="progress-container"><div class="progress-bar" id="savingProgress"></div></div>
            <div style="font-size:13px">💰 當前存款額: <span id="currentSaving">$0</span></div>
        </div>

        <div class="section-card">
            <div class="form-row">
                <div class="input-group"><label>存入金額</label><input type="number" id="savingAmt"></div>
                <div class="input-group"><label>日期</label><input type="date" id="savingDate"></div>
            </div>
            <button class="add-btn" onclick="addSaving()">📥 存入小金庫</button>
        </div>
        <div id="savingList"></div>
    </div>

    <!-- 統計頁面 -->
    <div id="statsPanel" class="panel">
        <div class="page-title">📊 收支洞察報告</div>
        <div id="reportCompare" style="font-size:13px; margin: 15px 0; color:#555"></div>
        <div class="section-card">
            <canvas id="expenseChart"></canvas>
        </div>
    </div>

    <!-- 導航 -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showPanel('income')"><span class="nav-icon">💰</span>收入</div>
        <div class="nav-item" onclick="showPanel('expense')"><span class="nav-icon">💸</span>支出</div>
        <div class="nav-item" onclick="showPanel('wealth')"><span class="nav-icon">📈</span>理財</div>
        <div class="nav-item" onclick="showPanel('saving')"><span class="nav-icon">🏦</span>存款</div>
        <div class="nav-item" onclick="showPanel('stats')"><span class="nav-icon">📊</span>統計</div>
    </div>
</div>

<script>
    // --- 資料結構與初始化 ---
    let db = {
        transactions: [], // {id, type, date, cat, amt, note}
        wealth: { records: [], accInterest: 0, lastUpdate: null },
        savings: { records: [], target: 50000 }
    };

    let currentYM = new Date().toISOString().slice(0, 7); // YYYY-MM
    let chartObj = null;

    function init() {
        const saved = localStorage.getItem('nn_diary_db');
        if (saved) db = JSON.parse(saved);
        
        // 初始化日期選擇器
        const today = new Date().toISOString().slice(0, 10);
        ['incDate', 'expDate', 'wealthDate', 'savingDate'].forEach(id => {
            document.getElementById(id).value = today;
        });

        calculateWealthInterest();
        refreshUI();
    }

    // --- 核心逻辑 ---
    function save() {
        localStorage.setItem('nn_diary_db', JSON.stringify(db));
        refreshUI();
    }

    function addRecord(type) {
        const amt = parseFloat(document.getElementById(type === 'income' ? 'incAmt' : 'expAmt').value);
        if (!amt) return;
        const record = {
            id: Date.now(),
            type: type,
            date: document.getElementById(type === 'income' ? 'incDate' : 'expDate').value,
            cat: document.getElementById(type === 'income' ? 'incCat' : 'expCat').value,
            amt: amt,
            note: document.getElementById(type === 'income' ? 'incNote' : 'expNote').value
        };
        db.transactions.push(record);
        save();
        // 清空輸入
        document.getElementById(type === 'income' ? 'incAmt' : 'expAmt').value = '';
        document.getElementById(type === 'income' ? 'incNote' : 'expNote').value = '';
    }

    function deleteRecord(id) {
        db.transactions = db.transactions.filter(r => r.id !== id);
        save();
    }

    // 理財邏輯 (存款寶)
    function addWealth() {
        const amt = parseFloat(document.getElementById('wealthAmt').value);
        const date = document.getElementById('wealthDate').value;
        if (!amt) return;
        db.wealth.records.push({ id: Date.now(), amt, date });
        save();
        document.getElementById('wealthAmt').value = '';
    }

    function calculateWealthInterest() {
        const now = new Date();
        const last = db.wealth.lastUpdate ? new Date(db.wealth.lastUpdate) : new Date();
        
        // 簡單模擬：如果跨天了，根據總額計算利息
        const diffDays = Math.floor((now - last) / (1000 * 60 * 60 * 24));
        if (diffDays > 0) {
            const principal = db.wealth.records.reduce((s, r) => s + r.amt, 0);
            const dailyRate = 0.02 / 365;
            // 累加利息
            const newInterest = principal * dailyRate * diffDays;
            db.wealth.accInterest += newInterest;
        }
        db.wealth.lastUpdate = now.toISOString();
    }

    // 存款邏輯
    function addSaving() {
        const amt = parseFloat(document.getElementById('savingAmt').value);
        const date = document.getElementById('savingDate').value;
        if (!amt) return;
        db.savings.records.push({ id: Date.now(), amt, date });
        save();
        document.getElementById('savingAmt').value = '';
    }

    function updateTarget() {
        db.savings.target = parseFloat(document.getElementById('savingTargetInput').value) || 0;
        save();
    }

    // --- UI 渲染 ---
    function refreshUI() {
        const [y, m] = currentYM.split('-');
        document.getElementById('currentMonthLabel').innerText = `${y}年${m}月`;

        const filterMonth = (list) => list.filter(r => r.date.startsWith(currentYM));

        // 1. 頂部摘要
        const monthlyInc = filterMonth(db.transactions).filter(r => r.type === 'income').reduce((s, r) => s + r.amt, 0);
        const monthlyExp = filterMonth(db.transactions).filter(r => r.type === 'expense').reduce((s, r) => s + r.amt, 0);
        const monthlySave = filterMonth(db.savings.records).reduce((s, r) => s + r.amt, 0);
        const survival = monthlyInc - monthlyExp - monthlySave;

        document.getElementById('topIncome').innerText = `$${monthlyInc.toLocaleString()}`;
        document.getElementById('topExpense').innerText = `$${monthlyExp.toLocaleString()}`;
        document.getElementById('topSurvival').innerText = `$${survival.toLocaleString()}`;
        document.getElementById('pageIncTotal').innerText = `$${monthlyInc.toLocaleString()}`;
        document.getElementById('pageExpTotal').innerText = `$${monthlyExp.toLocaleString()}`;

        // 2. 列表渲染 (以收入為例)
        renderList('incomeList', filterMonth(db.transactions).filter(r => r.type === 'income'));
        renderList('expenseList', filterMonth(db.transactions).filter(r => r.type === 'expense'));
        renderSimpleList('wealthList', db.wealth.records, 'wealth');
        renderSimpleList('savingList', db.savings.records, 'savings');

        // 3. 理財資料
        const wealthPrincipal = db.wealth.records.reduce((s, r) => s + r.amt, 0);
        document.getElementById('wealthTotal').innerText = `$${(wealthPrincipal + db.wealth.accInterest).toFixed(2)}`;
        document.getElementById('accInterest').innerText = `$${db.wealth.accInterest.toFixed(2)}`;

        // 4. 存款資料
        const totalSaved = db.savings.records.reduce((s, r) => s + r.amt, 0);
        document.getElementById('currentSaving').innerText = `$${totalSaved.toLocaleString()}`;
        document.getElementById('targetDisplay').innerText = `$${db.savings.target.toLocaleString()}`;
        document.getElementById('savingTargetInput').value = db.savings.target;
        const progress = Math.min(100, (totalSaved / (db.savings.target || 1)) * 100);
        document.getElementById('savingProgress').style.width = progress + '%';
        
        updateChart(filterMonth(db.transactions).filter(r => r.type === 'expense'));
        updateStatsReport(monthlyInc, monthlyExp);
    }

    function getWeekday(dateStr) {
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        return '週' + days[new Date(dateStr).getDay()];
    }

    function renderList(containerId, data) {
        const container = document.getElementById(containerId);
        container.innerHTML = data.sort((a,b) => b.date.localeCompare(a.date)).map((r, i) => `
            <div class="record-item">
                <div class="rec-left">
                    <div class="rec-row-1">
                        <span class="rec-id">#${data.length - i}</span>
                        <span class="rec-date">${r.date} (${getWeekday(r.date)})</span>
                    </div>
                    <div class="rec-row-2">
                        <span class="rec-cat">${r.cat}</span>
                        <span class="rec-note">${r.note ? '📝 ' + r.note : ''}</span>
                    </div>
                </div>
                <div class="rec-amount ${r.type==='income'?'amt-in':'amt-out'}">
                    ${r.type==='income'?'+':'-'}$${r.amt.toLocaleString()}
                    <div style="font-size:10px; color:#ccc; cursor:pointer" onclick="deleteRecord(${r.id})">刪除</div>
                </div>
            </div>
        `).join('');
    }

    function renderSimpleList(containerId, data, type) {
        const container = document.getElementById(containerId);
        container.innerHTML = data.sort((a,b) => b.date.localeCompare(a.date)).map(r => `
            <div class="record-item">
                <div class="rec-date">${r.date} 存入</div>
                <div class="rec-amount amt-in">+$${r.amt.toLocaleString()} 
                <span style="font-size:10px; color:#ccc" onclick="deleteSimple('${type}', ${r.id})">刪除</span></div>
            </div>
        `).join('');
    }

    function deleteSimple(type, id) {
        if (type === 'wealth') db.wealth.records = db.wealth.records.filter(r => r.id !== id);
        else db.savings.records = db.savings.records.filter(r => r.id !== id);
        save();
    }

    // --- 統計圖表 ---
    function updateChart(expenses) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        const cats = {};
        expenses.forEach(r => cats[r.cat] = (cats[r.cat] || 0) + r.amt);
        
        const labels = Object.keys(cats);
        const values = Object.values(cats);

        if (chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#bc6c25', '#dda15e', '#606c38', '#283618', '#f4a261', '#e76f51', '#264653']
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => {
                                let sum = values.reduce((a, b) => a + b, 0);
                                let perc = ((ctx.raw / sum) * 100).toFixed(1) + '%';
                                return ` ${ctx.label}: $${ctx.raw} (${perc})`;
                            }
                        }
                    }
                }
            }
        });
    }

    function updateStatsReport(thisInc, thisExp) {
        const lastDate = new Date(currentYM + '-01');
        lastDate.setMonth(lastDate.getMonth() - 1);
        const lastYM = lastDate.toISOString().slice(0, 7);
        
        const lastInc = db.transactions.filter(r => r.date.startsWith(lastYM) && r.type === 'income').reduce((s,r)=>s+r.amt,0);
        const lastExp = db.transactions.filter(r => r.date.startsWith(lastYM) && r.type === 'expense').reduce((s,r)=>s+r.amt,0);

        const incDiff = thisInc - lastInc;
        const expDiff = thisExp - lastExp;

        document.getElementById('reportCompare').innerHTML = `
            對比上月 (${lastYM})：<br>
            收入：${incDiff >= 0 ? '↗️ 增加' : '↘️ 減少'} $${Math.abs(incDiff).toLocaleString()}<br>
            支出：${expDiff >= 0 ? '🔺 增加' : '🥗 減少'} $${Math.abs(expDiff).toLocaleString()}
        `;
    }

    // --- 導航切換 ---
    function showPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById(id + 'Panel').classList.add('active-panel');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if (id === 'stats') refreshUI(); 
    }

    function changeMonth(step) {
        let [y, m] = currentYM.split('-').map(Number);
        m += step;
        if (m > 12) { m = 1; y++; }
        if (m < 1) { m = 12; y--; }
        currentYM = `${y}-${String(m).padStart(2, '0')}`;
        refreshUI();
    }

    init();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registered:', reg.scope))
                .catch(err => console.warn('Service Worker registration failed:', err));
        });
    }
</script>

</body>
</html>
